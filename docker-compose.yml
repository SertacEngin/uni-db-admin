services:
  postgres:
    image: postgres:16
    container_name: uni-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: uni-mariadb
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: uni-mongodb
    env_file: .env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: uni-oracle
    env_file: .env
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: unless-stopped

volumes:
  postgres_data:
  mariadb_data:
  mongo_data:
  oracle_data:
